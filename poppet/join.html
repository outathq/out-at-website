<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Join Out At</title>
  <meta name="description" content="Join the Out At list for LGBTQ+ socials, weekends and trips.">
  <link rel="canonical" href="/poppet/join.html">
  <link rel="stylesheet" href="../assets/styles.css">
  <script src="../assets/join-form.js" defer></script>
</head>
<body class="join-page branded-join-page">
  <header class="public-header join-shell">
    <a class="public-wordmark out-at-wordmark" href="/poppet/">
      <span>OUT AT</span>
      <span class="gradient-line"></span>
    </a>
  </header>

  <main class="join-shell branded-join">
    <section class="join-intro branded-join-intro">
      <p class="eyebrow">Join the list</p>
      <h1>Come along when it feels right.</h1>
      <p>
        We’ll send calm, useful updates about upcoming London socials, friendly weekends and future Out At trips. No hard sell, no pressure.
      </p>
    </section>

    <section class="join-card" aria-label="Out At join form">
      <form class="join-form branded-join-form" action="/api/join" method="post" data-join-form>
        <div class="form-grid">
          <label>
            <span>Preferred name</span>
            <input name="preferred_name" type="text" autocomplete="given-name" required>
          </label>

          <label>
            <span>Email address</span>
            <input name="email" type="email" autocomplete="email" required>
          </label>

          <label>
            <span>Pronouns <em>optional</em></span>
            <input name="pronouns" type="text" autocomplete="off">
          </label>

          <label>
            <span>Location <em>optional</em></span>
            <input name="location" type="text" autocomplete="address-level2">
          </label>
        </div>

        <fieldset>
          <legend>What are you interested in?</legend>
          <label><input type="checkbox" name="interests" value="London socials"> London socials</label>
          <label><input type="checkbox" name="interests" value="Sitges weekend"> Sitges weekend</label>
          <label><input type="checkbox" name="interests" value="Future cruises"> Future cruises</label>
          <label><input type="checkbox" name="interests" value="Other trips"> Other trips</label>
        </fieldset>

        <label class="full-field">
          <span>Anything we should know? <em>optional</em></span>
          <textarea name="notes" rows="5"></textarea>
        </label>

        <label class="consent-check">
          <input name="consent" type="checkbox" value="yes" required>
          <span>I’m happy for Out At to contact me about socials, weekends and trips.</span>
        </label>

        <button class="button primary" type="submit">Join the list</button>

        <p class="form-status" data-form-status role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>
</body>
</html>
